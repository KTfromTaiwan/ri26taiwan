<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chekcin 壓力測試</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #0d0f14; color: #e8eaf2; padding: 24px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
.section { background: #1c2030; border: 1px solid #2a2f42; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.section h2 { font-size: 12px; letter-spacing: .12em; color: #6b7280; text-transform: uppercase; margin-bottom: 14px; }
label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
input, textarea, select {
  width: 100%; padding: 10px 12px; font-size: 14px;
  background: #151820; border: 1px solid #2a2f42; border-radius: 8px;
  color: #e8eaf2; outline: none; font-family: inherit;
}
textarea { resize: vertical; font-family: 'Courier New', monospace; font-size: 13px; }
input:focus, textarea:focus, select:focus { border-color: #4ade80; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.btn {
  padding: 12px 24px; font-size: 15px; font-weight: 700; border: none;
  border-radius: 10px; cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.btn-primary { background: #4ade80; color: #0d0f14; width: 100%; margin-top: 4px; }
.btn-primary:hover { opacity: .9; }
.btn-primary:disabled { background: #2a2f42; color: #6b7280; cursor: not-allowed; }
.btn-clear { background: transparent; border: 1px solid #2a2f42; color: #9ca3af; font-size: 13px; padding: 6px 14px; border-radius: 8px; cursor: pointer; }

/* Stats bar */
.stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 16px; }
.stat { background: #1c2030; border: 1px solid #2a2f42; border-radius: 10px; padding: 12px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; font-family: 'Courier New', monospace; }
.stat-lbl { font-size: 11px; color: #6b7280; margin-top: 2px; }
.c-total  { color: #e8eaf2; }
.c-ok     { color: #4ade80; }
.c-retry  { color: #f59e0b; }
.c-fail   { color: #f87171; }
.c-reject { color: #9ca3af; }
.c-fly    { color: #60a5fa; }

/* Results table */
.results { width: 100%; border-collapse: collapse; font-size: 13px; }
.results th { text-align: left; padding: 8px 10px; color: #6b7280; border-bottom: 1px solid #2a2f42; font-weight: 400; font-size: 11px; letter-spacing: .08em; }
.results td { padding: 8px 10px; border-bottom: 1px solid #1a1e2a; vertical-align: top; }
.results tr:last-child td { border-bottom: none; }
.pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-family: 'Courier New', monospace; }
.p-pending { background: #1e2535; color: #6b7280; border: 1px solid #2a2f42; }
.p-fly     { background: rgba(96,165,250,.12); color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }
.p-ok      { background: rgba(74,222,128,.1); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
.p-retry   { background: rgba(245,158,11,.1); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
.p-fail    { background: rgba(248,113,113,.1); color: #f87171; border: 1px solid rgba(248,113,113,.3); }
.p-reject  { background: rgba(107,114,128,.12); color: #9ca3af; border: 1px solid #2a2f42; }
.p-busyok  { background: rgba(74,222,128,.08); color: #86efac; border: 1px solid rgba(74,222,128,.25); }
.note { font-size: 11px; color: #6b7280; margin-top: 2px; }
.timing { font-family: 'Courier New', monospace; color: #9ca3af; }

.hint { font-size: 12px; color: #6b7280; margin-top: 8px; line-height: 1.5; }
.warn { color: #f59e0b; }
.hidden { display: none; }
</style>
</head>

<!-- Stats -->

<div id="summary-box" class="section hidden" style="margin-top:16px;"></div>

<script>
const $ = id => document.getElementById(id);
let rows = [];
let running = false;

function parseStaff() {
  return $('staffList').value.trim().split('\n')
    .map(l => l.trim()).filter(Boolean)
    .map((l, i) => {
      const parts = l.split(',');
      return { idx: i + 1, name: (parts[0] || '').trim(), pin: (parts[1] || '').trim() };
    })
    .filter(s => s.name && s.pin);
}

function statusPill(state) {
  const map = {
    pending: ['p-pending', '待送出'],
    fly:     ['p-fly',   '進行中'],
    ok:      ['p-ok',    '成功'],
    busyok:  ['p-busyok','重試後成功'],
    retry:   ['p-retry', '重試中'],
    reject:  ['p-reject', '業務拒絕'],
    fail:    ['p-fail',  '系統失敗'],
  };
  const [cls, label] = map[state] || ['p-pending', state];
  return `<span class="pill ${cls}">${label}</span>`;
}

const REJECT_REASONS = new Set(['no_schedule','wrong_location','pin_mismatch','pin_not_configured','in_too_early','in_too_late','out_too_early','out_too_late','out_before_start','unknown_venue','low_accuracy','staff_not_found','line_id_mismatch']);

function updateStats() {
  const fly    = rows.filter(r => r.state === 'fly' || r.state === 'retry').length;
  const ok     = rows.filter(r => r.state === 'ok' || r.state === 'busyok').length;
  const retried = rows.filter(r => r.retries > 0).length;
  const reject = rows.filter(r => r.state === 'reject').length;
  const fail   = rows.filter(r => r.state === 'fail').length;
  $('s-total').textContent  = rows.length;
  $('s-fly').textContent    = fly;
  $('s-ok').textContent     = ok;
  $('s-retry').textContent  = retried;
  $('s-reject').textContent = reject;
  $('s-fail').textContent   = fail;
}

function renderRow(r) {
  const tr = document.getElementById('row-' + r.idx);
  const elapsed = r.endMs ? ((r.endMs - r.startMs) / 1000).toFixed(2) + 's' : (r.startMs ? ((Date.now() - r.startMs) / 1000).toFixed(1) + 's...' : '—');
  const noteHtml = r.note ? `<div class="note">${r.note}</div>` : '';
  tr.innerHTML = `
    <td>${r.idx}</td>
    <td>${r.name}</td>
    <td>${statusPill(r.state)}</td>
    <td class="timing">${r.retries > 0 ? r.retries + '次' : '—'}</td>
    <td class="timing">${elapsed}</td>
    <td>${noteHtml}</td>`;
}

async function gasCall(gasUrl, action, params) {
  const qs = new URLSearchParams({ action });
  Object.entries(params).forEach(([k, v]) => qs.set(k, String(v)));
  const res = await fetch(gasUrl + '?' + qs.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json.result;
}

async function sendOne(r, gasUrl, type, lat, lng, accuracy, maxRetry) {
  r.state = 'fly';
  r.startMs = Date.now();
  renderRow(r);
  updateStats();

  const params = { staffName: r.name, pin: r.pin, type, lat, lng, accuracy };

  for (let i = 0; i < maxRetry; i++) {
    if (i > 0) {
      r.state = 'retry';
      const wait = 1000 + Math.floor(Math.random() * 4000); // 1~5 秒，與正式網頁相同
      r.note = `等待 ${(wait/1000).toFixed(1)}s 後第 ${i+1} 次重試...`;
      renderRow(r);
      await new Promise(res => setTimeout(res, wait));
    }
    try {
      const data = await gasCall(gasUrl, 'submitPunch', params);
      if (data && data.reason === 'server_busy' && i < maxRetry - 1) {
        r.retries++;
        continue;
      }
      r.endMs = Date.now();
      if (data && data.ok) {
        r.state = r.retries > 0 ? 'busyok' : 'ok';
        r.note = `${data.scheduled_venue || ''} · ${data.verdict || ''}`;
      } else if (data && data.reason === 'server_busy') {
        r.state = 'fail';
        r.note = '伺服器忙碌，retry 用完';
      } else if (data && !data.ok && REJECT_REASONS.has(data.reason)) {
        r.state = 'reject';
        r.note = data.message || data.reason;
      } else {
        r.state = 'fail';
        r.note = data ? (data.message || data.reason || JSON.stringify(data)) : '無回應';
      }
      renderRow(r);
      updateStats();
      return;
    } catch(e) {
      const retryable = i < maxRetry - 1 && e.message &&
        (e.message.includes('HTTP 5') || e.message.toLowerCase().includes('lock') ||
         e.message.includes('503') || e.message.toLowerCase().includes('failed to fetch') ||
         e.message.toLowerCase().includes('networkerror'));
      if (!retryable) {
        r.endMs = Date.now();
        r.state = 'fail';
        r.note = e.message || String(e);
        renderRow(r);
        updateStats();
        return;
      }
      r.retries++;
    }
  }
  r.endMs = Date.now();
  r.state = 'fail';
  r.note = 'Retry 用完';
  renderRow(r);
  updateStats();
}

async function runTest() {
  if (running) return;
  const staff = parseStaff();
  if (!staff.length) { alert('請輸入至少一筆人員資料'); return; }

  running = true;
  $('btnFire').disabled = true;
  $('btnFire').textContent = '測試中...';

  const gasUrl   = $('gasUrl').value.trim();
  const type     = $('punchType').value;
  const lat      = parseFloat($('lat').value);
  const lng      = parseFloat($('lng').value);
  const accuracy = parseFloat($('acc').value);
  const maxRetry = parseInt($('maxRetry').value);


  rows = staff.map(s => ({ ...s, state: 'pending', retries: 0, startMs: null, endMs: null, note: '' }));

  // Render skeleton
  const tbody = $('tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + r.idx;
    tbody.appendChild(tr);
    renderRow(r);
  });
  updateStats();

  // 錯開發送：每筆間隔 staggerMs，避免同時打爆 GAS 並發上限
  const staggerMs = 200;  // 每人間隔 200ms，100人 = 20秒內全部送出
  await Promise.all(rows.map((r, idx) =>
    new Promise(res => setTimeout(res, idx * staggerMs))
      .then(() => sendOne(r, gasUrl, type, lat, lng, accuracy, maxRetry))
  ));

  running = false;
  $('btnFire').disabled = false;
  $('btnFire').textContent = '🚀 同時送出所有請求';
  renderSummary();
}

function clearResults() {
  $('tbody').innerHTML = '';
  rows = [];
  updateStats();
  $('summary-box').classList.add('hidden');
}

function renderSummary() {
  if (!rows.length) return;
  const done = rows.filter(r => !['fly','retry','pending'].includes(r.state));
  if (!done.length) return;

  const total    = rows.length;
  const ok       = rows.filter(r => r.state === 'ok' || r.state === 'busyok').length;
  const busyok   = rows.filter(r => r.state === 'busyok').length;
  const retried  = rows.filter(r => r.retries > 0).length;
  const reject   = rows.filter(r => r.state === 'reject').length;
  const fail     = rows.filter(r => r.state === 'fail').length;
  const timings  = rows.filter(r => r.startMs && r.endMs).map(r => r.endMs - r.startMs);
  const avgMs    = timings.length ? Math.round(timings.reduce((a,b)=>a+b,0)/timings.length) : 0;
  const maxMs    = timings.length ? Math.max(...timings) : 0;
  const minMs    = timings.length ? Math.min(...timings) : 0;
  const successRate = Math.round(ok / total * 100);

  const failReasons = {};
  rows.filter(r => r.state === 'fail' || r.state === 'reject').forEach(r => {
    const k = r.note ? r.note.split('，')[0].split('(')[0].trim() : '未知';
    failReasons[k] = (failReasons[k] || 0) + 1;
  });
  const reasonLines = Object.entries(failReasons)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1e2a;font-size:12px;"><span style="color:#9ca3af;">${k}</span><span style="font-family:'Courier New';color:#e8eaf2;">${v} 筆</span></div>`)
    .join('');

  $('summary-box').innerHTML = `
    <h2 style="margin:0 0 16px;">測試結果摘要</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div style="background:#151820;border-radius:10px;padding:14px;">
        <div style="font-size:11px;color:#6b7280;margin-bottom:8px;letter-spacing:.08em;">成功率</div>
        <div style="font-size:36px;font-weight:700;font-family:'Courier New';color:${successRate>=90?'#4ade80':successRate>=70?'#f59e0b':'#f87171'};">${successRate}%</div>
        <div style="font-size:12px;color:#6b7280;margin-top:4px;">${ok} / ${total} 筆成功</div>
      </div>
      <div style="background:#151820;border-radius:10px;padding:14px;">
        <div style="font-size:11px;color:#6b7280;margin-bottom:8px;letter-spacing:.08em;">耗時統計</div>
        <div style="font-size:13px;font-family:'Courier New';line-height:2;">
          <span style="color:#6b7280;">平均</span> <span style="color:#e8eaf2;">${(avgMs/1000).toFixed(2)}s</span><br>
          <span style="color:#6b7280;">最快</span> <span style="color:#4ade80;">${(minMs/1000).toFixed(2)}s</span><br>
          <span style="color:#6b7280;">最慢</span> <span style="color:#f59e0b;">${(maxMs/1000).toFixed(2)}s</span>
        </div>
      </div>
    </div>
    <div style="background:#151820;border-radius:10px;padding:14px;margin-bottom:12px;">
      <div style="font-size:11px;color:#6b7280;margin-bottom:10px;letter-spacing:.08em;">細項</div>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1e2a;font-size:13px;"><span style="color:#9ca3af;">首次成功</span><span style="font-family:'Courier New';color:#4ade80;">${ok - busyok} 筆</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1e2a;font-size:13px;"><span style="color:#9ca3af;">重試後成功</span><span style="font-family:'Courier New';color:#86efac;">${busyok} 筆</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1e2a;font-size:13px;"><span style="color:#9ca3af;">曾觸發重試</span><span style="font-family:'Courier New';color:#f59e0b;">${retried} 筆</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1e2a;font-size:13px;"><span style="color:#9ca3af;">業務拒絕</span><span style="font-family:'Courier New';color:#9ca3af;">${reject} 筆</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;"><span style="color:#9ca3af;">系統失敗</span><span style="font-family:'Courier New';color:#f87171;">${fail} 筆</span></div>
      </div>
    </div>
    ${failReasons && Object.keys(failReasons).length ? `
    <div style="background:#151820;border-radius:10px;padding:14px;">
      <div style="font-size:11px;color:#6b7280;margin-bottom:10px;letter-spacing:.08em;">失敗原因分布</div>
      ${reasonLines}
    </div>` : ''}
  `;
  $('summary-box').classList.remove('hidden');
}
</script>
</body>
</html>
