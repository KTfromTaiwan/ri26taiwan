<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Chekcin Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:          #0d0f14;
  --surface:     #151820;
  --card:        #1c2030;
  --border:      #2a2f42;
  --accent:      #4ade80;
  --accent-dim:  rgba(74,222,128,.12);
  --accent-glow: rgba(74,222,128,.35);
  --warn:        #f59e0b;
  --err:         #f87171;
  --blue:        #60a5fa;
  --text:        #e8eaf2;
  --muted:       #6b7280;
  --radius:      16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: 0; right: 0; bottom: 0; left: 0;
  background-image:
    linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

.wrapper {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 80px;
  display: flex; flex-direction: column; gap: 16px;
}

/* Header */
.header { text-align: center; }
.header .brand { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.header h1 { font-size: 26px; font-weight: 900; letter-spacing: -.5px; }
.header h1 span { color: var(--accent); }

/* Date bar */
.date-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
}
.date-bar label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
.date-bar input[type=date] {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--accent); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500;
  cursor: pointer;
}
.date-bar input[type=date]::-webkit-calendar-picker-indicator { filter: invert(70%) sepia(60%) saturate(400%) hue-rotate(90deg); cursor: pointer; }
.btn-load {
  background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent);
  border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: background .15s;
  white-space: nowrap;
}
.btn-load:hover { background: rgba(74,222,128,.22); }
.btn-load:active { background: rgba(74,222,128,.3); }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 480px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }

.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 14px; text-align: center;
}
.kpi-card.green  { border-color: rgba(74,222,128,.3);  }
.kpi-card.blue   { border-color: rgba(96,165,250,.3);  }
.kpi-card.yellow { border-color: rgba(245,158,11,.3);  }
.kpi-card.red    { border-color: rgba(248,113,113,.3); }

.kpi-num {
  font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 500; line-height: 1;
  margin-bottom: 6px;
}
.kpi-card.green  .kpi-num { color: var(--accent); }
.kpi-card.blue   .kpi-num { color: var(--blue);   }
.kpi-card.yellow .kpi-num { color: var(--warn);   }
.kpi-card.red    .kpi-num { color: var(--err);    }

.kpi-label { font-size: 11px; color: var(--muted); letter-spacing: .05em; }
.kpi-sub   { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 3px; }

/* Section title */
.section-title {
  font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .18em;
  color: var(--muted); text-transform: uppercase; padding: 0 2px;
}

/* Shift cards */
.shift-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.shift-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; cursor: pointer; user-select: none;
  transition: background .12s;
}
.shift-header:hover { background: rgba(255,255,255,.03); }

.shift-time {
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500;
  color: var(--accent); min-width: 52px;
}
.shift-bar-wrap { flex: 1; }
.shift-bar-track {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 5px;
}
.shift-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
.shift-bar-fill.warn   { background: var(--warn); }
.shift-bar-fill.danger { background: var(--err);  }

.shift-counts { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.shift-counts strong { color: var(--text); }

.shift-chevron { color: var(--muted); font-size: 14px; transition: transform .2s; }
.shift-card.open .shift-chevron { transform: rotate(180deg); }

.shift-body { display: none; border-top: 1px solid var(--border); }
.shift-card.open .shift-body { display: block; }

/* Staff row inside shift */
.staff-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid rgba(42,47,66,.6);
}
.staff-row:last-child { border-bottom: none; }

.staff-dot {
  width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0;
}
.dot-present { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
.dot-failed  { background: var(--warn);   box-shadow: 0 0 6px rgba(245,158,11,.4); }
.dot-absent  { background: var(--muted);  }

.staff-info { flex: 1; min-width: 0; }
.staff-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.staff-meta { font-size: 12px; color: var(--muted); }
.staff-meta span { margin-right: 8px; }

.staff-status { text-align: right; flex-shrink: 0; }
.badge {
  display: inline-block; font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 3px 8px; border-radius: 6px; font-weight: 500;
}
.badge-present { background: var(--accent-dim);           color: var(--accent); border: 1px solid rgba(74,222,128,.3); }
.badge-failed  { background: rgba(245,158,11,.1);         color: var(--warn);   border: 1px solid rgba(245,158,11,.3); }
.badge-absent  { background: rgba(107,114,128,.1);        color: var(--muted);  border: 1px solid rgba(107,114,128,.25); }
.badge-out     { background: rgba(96,165,250,.1);         color: var(--blue);   border: 1px solid rgba(96,165,250,.3); }

.fail-reason { font-size: 11px; color: var(--err); margin-top: 4px; }

/* Staff table */
.table-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}

.filter-tabs { display: flex; border-bottom: 1px solid var(--border); }
.filter-tab {
  flex: 1; padding: 12px 6px; text-align: center;
  font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted);
  cursor: pointer; border: none; background: none; transition: all .15s;
  border-bottom: 2px solid transparent; letter-spacing: .04em;
}
.filter-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.filter-tab:hover:not(.active) { color: var(--text); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 14px;
  font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .12em;
  color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 10px 14px; border-bottom: 1px solid rgba(42,47,66,.5); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
.td-name { font-weight: 700; }
.td-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
.td-note { font-size: 11px; color: var(--err); }

/* Loading / empty */
.msg-center {
  text-align: center; padding: 40px 20px;
  font-size: 13px; font-family: 'DM Mono', monospace; color: var(--muted);
}
.spinner { display: inline-block; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Pulse on load */
@keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }
.blink { animation: blink 1.2s infinite; }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="brand">Chekcin System</div>
    <h1>出勤 <span>Dashboard</span></h1>
  </div>

  <!-- Date picker -->
  <div class="date-bar">
    <label>DATE</label>
    <input type="date" id="datePicker">
    <button class="btn-load" onclick="loadDashboard()">載入</button>
  </div>

  <!-- KPI -->
  <div id="kpiGrid" class="kpi-grid" style="display:none">
    <div class="kpi-card blue">
      <div class="kpi-num" id="kpiScheduled">—</div>
      <div class="kpi-label">排班人數</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-num" id="kpiPresent">—</div>
      <div class="kpi-label">已到班</div>
      <div class="kpi-sub" id="kpiPresentPct">—</div>
    </div>
    <div class="kpi-card yellow">
      <div class="kpi-num" id="kpiFailed">—</div>
      <div class="kpi-label">打卡失敗</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-num" id="kpiAbsent">—</div>
      <div class="kpi-label">缺席</div>
    </div>
  </div>

  <!-- Shifts -->
  <div class="section-title" id="shiftTitle" style="display:none">班次明細</div>
  <div id="shiftsContainer"></div>

  <!-- Staff table -->
  <div class="section-title" id="tableTitle" style="display:none">人員清單</div>
  <div class="table-card" id="tableCard" style="display:none">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all"    onclick="setFilter('all')">全部</button>
      <button class="filter-tab"        data-filter="present" onclick="setFilter('present')">到班</button>
      <button class="filter-tab"        data-filter="failed"  onclick="setFilter('failed')">失敗</button>
      <button class="filter-tab"        data-filter="absent"  onclick="setFilter('absent')">缺席</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>組別</th>
            <th>場地</th>
            <th>班次</th>
            <th>打卡</th>
            <th>狀態</th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody id="staffTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Message area -->
  <div id="msgArea"></div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzdJ_XW51f7LmRsgX6T6yVIm29JaEU1e-1Y4F7X7RQ1kTc0iLuocJeU2YUiT7wFI15D3Q/exec';

let currentData = null;
let currentFilter = 'all';

// Init: set today's date
(function() {
  const today = new Date();
  const pad = n => String(n).padStart(2, '0');
  const s = today.getFullYear() + '-' + pad(today.getMonth()+1) + '-' + pad(today.getDate());
  document.getElementById('datePicker').value = s;
  loadDashboard();
})();

async function loadDashboard() {
  const date = document.getElementById('datePicker').value;
  if (!date) return;

  showMsg('<span class="spinner">⟳</span> 載入中…');
  hideAll();

  try {
    const url = GAS_URL + '?action=getDashboard&date=' + date;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.result) throw new Error('no result');
    currentData = json.result;
    renderDashboard(currentData);
    clearMsg();
  } catch(e) {
    showMsg('⚠️ 載入失敗，請確認網路或 GAS 部署狀態。');
  }
}

function renderDashboard(data) {
  const s = data.summary;

  // KPI
  document.getElementById('kpiScheduled').textContent = s.scheduled;
  document.getElementById('kpiPresent').textContent   = s.present;
  document.getElementById('kpiAbsent').textContent    = s.absent;
  document.getElementById('kpiFailed').textContent    = s.punch_failed;
  const pct = s.scheduled > 0 ? Math.round(s.present / s.scheduled * 100) : 0;
  document.getElementById('kpiPresentPct').textContent = pct + '%';
  document.getElementById('kpiGrid').style.display = '';

  // Shifts
  const shiftsEl = document.getElementById('shiftsContainer');
  shiftsEl.innerHTML = '';
  if (data.shifts.length > 0) {
    document.getElementById('shiftTitle').style.display = '';
    data.shifts.forEach(shift => {
      shiftsEl.appendChild(buildShiftCard(shift));
    });
  }

  // Table
  if (data.staff.length > 0) {
    document.getElementById('tableTitle').style.display = '';
    document.getElementById('tableCard').style.display = '';
    renderTable(data.staff, currentFilter);
  }
}

function buildShiftCard(shift) {
  const pct = shift.scheduled > 0 ? Math.round(shift.present / shift.scheduled * 100) : 0;
  const absentStaff  = shift.staff.filter(s => s.status !== 'present');

  const card = document.createElement('div');
  card.className = 'shift-card';

  // Bar colour
  let barClass = '';
  if (pct < 50) barClass = 'danger';
  else if (pct < 85) barClass = 'warn';

  card.innerHTML = `
    <div class="shift-header" onclick="toggleShift(this)">
      <div class="shift-time">${shift.time}</div>
      <div class="shift-bar-wrap">
        <div class="shift-bar-track">
          <div class="shift-bar-fill ${barClass}" style="width:${pct}%"></div>
        </div>
        <div class="shift-counts">
          <strong>${shift.present}</strong> / ${shift.scheduled} 人到班
          ${absentStaff.length > 0 ? '・<span style="color:var(--err)">' + absentStaff.length + ' 人未到</span>' : ''}
        </div>
      </div>
      <div class="shift-chevron">▼</div>
    </div>
    <div class="shift-body">
      ${shift.staff.map(s => buildStaffRow(s)).join('')}
    </div>`;

  // Auto-open if anyone is absent/failed
  if (absentStaff.length > 0) {
    card.classList.add('open');
  }
  return card;
}

function buildStaffRow(s) {
  const dotClass   = { present:'dot-present', failed:'dot-failed', absent:'dot-absent' }[s.status];
  const badgeClass = { present:'badge-present', failed:'badge-failed', absent:'badge-absent' }[s.status];
  const badgeText  = { present:'到班', failed:'打卡失敗', absent:'缺席' }[s.status];
  const inTime     = s.in_time  ? s.in_time  : '—';
  const outBadge   = s.out_verdict ? `<span class="badge badge-out" style="margin-top:4px;display:inline-block">${s.out_verdict}</span>` : '';
  const failLine   = s.fail_reason ? `<div class="fail-reason">⚠ ${s.fail_reason}</div>` : '';

  return `<div class="staff-row">
    <div class="staff-dot ${dotClass}"></div>
    <div class="staff-info">
      <div class="staff-name">${s.name}</div>
      <div class="staff-meta">
        ${s.group ? '<span>' + s.group + '</span>' : ''}
        <span>📍 ${s.venue}</span>
      </div>
      ${failLine}
    </div>
    <div class="staff-status">
      <div class="badge ${badgeClass}">${badgeText}</div>
      ${s.status === 'present' ? '<div style="font-size:11px;font-family:DM Mono,monospace;color:var(--muted);margin-top:4px;">' + inTime + '</div>' : ''}
      ${outBadge}
    </div>
  </div>`;
}

function toggleShift(header) {
  header.closest('.shift-card').classList.toggle('open');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === f);
  });
  if (currentData) renderTable(currentData.staff, f);
}

function renderTable(staff, filter) {
  const filtered = filter === 'all' ? staff : staff.filter(s => s.status === filter);
  const tbody = document.getElementById('staffTableBody');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="msg-center">—</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(s => {
    const badgeClass = { present:'badge-present', failed:'badge-failed', absent:'badge-absent' }[s.status];
    const badgeText  = { present:'到班', failed:'打卡失敗', absent:'缺席' }[s.status];
    return `<tr>
      <td class="td-name">${s.name}</td>
      <td>${s.group || '—'}</td>
      <td>${s.venue}</td>
      <td class="td-time">${s.shift_start}${s.shift_end ? '–' + s.shift_end : ''}</td>
      <td class="td-time">${s.in_time || '—'}</td>
      <td><span class="badge ${badgeClass}">${badgeText}</span></td>
      <td class="td-note">${s.fail_reason || (s.status === 'present' && s.out_verdict ? s.out_verdict : '') || '—'}</td>
    </tr>`;
  }).join('');
}

function hideAll() {
  document.getElementById('kpiGrid').style.display     = 'none';
  document.getElementById('shiftTitle').style.display  = 'none';
  document.getElementById('tableTitle').style.display  = 'none';
  document.getElementById('tableCard').style.display   = 'none';
  document.getElementById('shiftsContainer').innerHTML = '';
}

function showMsg(html) {
  document.getElementById('msgArea').innerHTML = '<div class="msg-center">' + html + '</div>';
}
function clearMsg() {
  document.getElementById('msgArea').innerHTML = '';
}

// Allow pressing Enter on date picker
document.getElementById('datePicker').addEventListener('change', loadDashboard);
</script>
</body>
</html>
