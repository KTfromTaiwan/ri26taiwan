<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Chekcin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@300;400;500&display=swap">
<style>

:root {
  --bg:      #0d0f14;
  --card:    #161b27;
  --border:  #1f2535;
  --accent:  #4ade80;
  --warn:    #d97706;
  --err:     #f87171;
  --blue:    #60a5fa;
  --text:    #e8eaf2;
  --muted:   #6b7280;
  --dim:     #374151;
  --r:       14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Noto Sans TC', -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(74,222,128,.025) 1px,transparent 1px), linear-gradient(90deg,rgba(74,222,128,.025) 1px,transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}

/* ── Views ── */
.view { position: relative; z-index: 1; min-height: 100vh; padding: 32px 18px 80px; display: none; }
.view.active { display: block; }
.inner { max-width: 680px; margin: 0 auto; }

/* ── Header ── */
.brand { font-size: 10px; letter-spacing: .22em; color: var(--dim); text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.headline { font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: -.5px; margin-bottom: 22px; }
.headline span { color: var(--accent); }

/* ── Summary tiles ── */
.tile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

.tile {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 16px 16px 14px;
  cursor: pointer; display: flex; flex-direction: column; gap: 10px;
  transition: border-color .15s;
}
.tile:active { opacity: .85; }
.tile.today     { border-color: rgba(74,222,128,.4); background: #131d19; }
.tile.has-issue { border-color: rgba(248,113,113,.3); background: #1a1414; }

.tile-date-row { display: flex; align-items: center; gap: 6px; }
.tile-date { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: .01em; }
.tile.today .tile-date { color: var(--accent); }
.tile-dow  { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
.today-tag { font-size: 9px; padding: 1px 6px; border-radius: 20px; background: rgba(74,222,128,.15); color: var(--accent); border: 1px solid rgba(74,222,128,.3); letter-spacing: .03em; }

.tile-num-wrap { display: flex; align-items: baseline; gap: 5px; }
.tile-num { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 300; line-height: .95; letter-spacing: -4px; color: var(--text); }
.tile.today .tile-num { color: var(--accent); }
.tile-num.green { color: var(--accent); }
.tile-denom { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--dim); letter-spacing: -.5px; }
.tile-label { font-size: 11px; color: var(--muted); letter-spacing: .04em; margin-top: -4px; }

.tile-chips { display: flex; gap: 4px; flex-wrap: wrap; min-height: 20px; }
.chip { font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
.chip-red  { background: rgba(248,113,113,.12); color: var(--err);  }
.chip-amb  { background: rgba(217,119,6,.12);   color: var(--warn); }
.chip-blue { background: rgba(96,165,250,.12);  color: var(--blue); }
.chip-ok   { background: rgba(74,222,128,.1);   color: var(--accent); }

/* ── Future tiles ── */
.tile-future {
  background: #151920; border: 1px solid #232b3a;
  border-radius: 20px; padding: 16px 16px 14px;
  display: flex; flex-direction: column; gap: 10px;
  opacity: .7; pointer-events: none;
}
.tf-date { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 600; color: #3d4a5c; }
.tf-dow  { font-family: 'DM Mono', monospace; font-size: 12px; color: #2e3a4a; margin-left: 4px; }
.tf-num  { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 300; line-height: .95; letter-spacing: -4px; color: #252e3e; }
.tf-label{ font-size: 11px; color: #3d4a5c; letter-spacing: .04em; margin-top: -4px; }
.tf-lock { font-size: 10px; color: #3d4a5c; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 20px; border: 1px solid #2a3448; display: inline-block; }

/* ── Back bar ── */
.back-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.btn-back { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.25); border-radius: 20px; padding: 5px 13px; cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn-back:active { background: rgba(74,222,128,.2); }
.detail-date { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 600; color: var(--text); }
.detail-dow  { font-size: 12px; color: var(--muted); margin-left: 5px; font-family: 'DM Mono', monospace; }
.btn-refresh { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.25); border-radius: 20px; padding: 5px 10px; cursor: pointer; display: flex; align-items: center; transition: background .15s; }
.btn-refresh:active { background: rgba(74,222,128,.2); }
.btn-refresh svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 2; }

/* ── KPI row ── */
.kpi-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 18px; }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.kpi.green  { border-color: rgba(74,222,128,.3); }
.kpi.yellow { border-color: rgba(217,119,6,.25); }
.kpi.red    { border-color: rgba(248,113,113,.25); }
.kpi.blue   { border-color: rgba(96,165,250,.25); }
.kpi-n { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 300; line-height: 1; letter-spacing: -3px; flex-shrink: 0; }
.kpi.green  .kpi-n { color: var(--accent); }
.kpi.yellow .kpi-n { color: var(--warn);   }
.kpi.red    .kpi-n { color: var(--err);    }
.kpi.blue   .kpi-n { color: var(--blue);   }
.kpi-info { display: flex; flex-direction: column; gap: 4px; }
.kpi-lbl { font-size: 13px; color: var(--muted); letter-spacing: .04em; }
.kpi-sub { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--dim); }

/* ── Section label ── */
.sec { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }

/* ── Person row ── */
.prow { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid rgba(31,37,53,.6); }
.prow:last-child { border-bottom: none; }
.pdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pdot.ok   { background: var(--accent); box-shadow: 0 0 5px rgba(74,222,128,.4); }
.pdot.fail { background: var(--warn); }
.pdot.abs  { background: var(--muted); }
.pdot.pend { background: var(--blue); }
.pinfo { flex: 1; min-width: 0; }
.pname-row { display: flex; align-items: center; gap: 7px; }
.pid   { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; }
.pname { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; }
.pphone { display: inline-flex; align-items: center; gap: 3px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.2); border-radius: 20px; padding: 1px 7px; text-decoration: none; flex-shrink: 0; }
.pphone svg { width: 10px; height: 10px; stroke: var(--accent); fill: none; stroke-width: 2; }
.pmeta { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pmeta-warn { font-size: 11px; color: var(--warn); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pbadge { font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.pbadge.ok       { background: rgba(74,222,128,.1);  color: var(--accent); }
.pbadge.fail     { background: rgba(217,119,6,.1);   color: var(--warn);   }
.pbadge.abs      { background: rgba(107,114,128,.1); color: var(--muted);  }
.pbadge.pend     { background: rgba(96,165,250,.1);  color: var(--blue);   }
.pbadge.out-ok   { background: rgba(74,222,128,.07); color: var(--accent); border: 1px solid rgba(74,222,128,.15); }
.pbadge.out-fail { background: rgba(248,113,113,.12);color: var(--err);    }
.pbadge.out-abs  { background: rgba(107,114,128,.08);color: var(--muted);  }
.pbadge.out-pend { background: rgba(96,165,250,.07); color: var(--blue);   border: 1px solid rgba(96,165,250,.2); }
.ppunch { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 3px; }

/* ── Search ── */
.search-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; gap: 8px; padding: 11px 14px; margin-bottom: 8px; }
.search-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 13px; font-family: 'Noto Sans TC', sans-serif; }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { color: var(--muted); font-size: 14px; flex-shrink: 0; }

/* ── Filter tabs ── */
.tabs { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
.tab { flex: 1; text-align: center; padding: 10px 2px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .tc { font-size: 9px; opacity: .7; display: block; margin-top: 1px; }

/* ── People card ── */
.people-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.empty-row { text-align: center; padding: 28px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }

/* ── Loader ── */
.loader { text-align: center; padding: 60px 20px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }
.spin { display: inline-block; animation: spin .7s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ═══════════ SUMMARY ═══════════ -->
<div id="viewSummary" class="view active">
<div class="inner">
  <div class="brand">Chekcin System</div>
  <div style="display:flex;align-items:center;margin-bottom:22px">
    <div class="headline" style="margin-bottom:0">出勤 <span>Dashboard</span></div>
    <button class="btn-refresh" onclick="refreshToday()" title="重新整理今天">
      <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14.93-4M20 12a8 8 0 0 1-14.93 4"/><polyline points="20 4 20 8 16 8"/><polyline points="4 20 4 16 8 16"/></svg>
    </button>
  </div>
  <div id="summaryContent"><div class="loader"><span class="spin">⟳</span> 載入中…</div></div>
</div>
</div>

<!-- ═══════════ DETAIL ═══════════ -->
<div id="viewDetail" class="view">
<div class="inner">

  <div class="back-bar">
    <button class="btn-back" onclick="showSummary()">← 總表</button>
    <div><span class="detail-date" id="detailDate">—</span><span class="detail-dow" id="detailDow"></span></div>
    <button class="btn-refresh" onclick="loadDetail(currentDate)" title="重新整理">
      <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14.93-4M20 12a8 8 0 0 1-14.93 4"/><polyline points="20 4 20 8 16 8"/><polyline points="4 20 4 16 8 16"/></svg>
    </button>
  </div>

  <div class="kpi-row" id="kpiRow" style="display:none">
    <div class="kpi blue" ><div class="kpi-n" id="k0">—</div><div class="kpi-info"><div class="kpi-lbl">排班人數</div><div class="kpi-sub" id="k0s"></div></div></div>
    <div class="kpi green"><div class="kpi-n" id="k1">—</div><div class="kpi-info"><div class="kpi-lbl">已到班</div><div class="kpi-sub" id="k1s">—</div></div></div>
    <div class="kpi yellow"><div class="kpi-n" id="k2">—</div><div class="kpi-info"><div class="kpi-lbl">打卡失敗</div></div></div>
    <div class="kpi red"  ><div class="kpi-n" id="k3">—</div><div class="kpi-info"><div class="kpi-lbl">缺席</div></div></div>
  </div>

  <div class="sec" id="secPeople" style="display:none">需關注人員</div>

  <div id="searchArea" style="display:none">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋姓名 / 組別 / 場地…" oninput="applyFilter()">
    </div>
    <div class="tabs">
      <button class="tab active" data-f="alert"   onclick="setFilter('alert')"  >需關注<span class="tc" id="tcA"></span></button>
      <button class="tab"        data-f="failed"  onclick="setFilter('failed')" >失敗<span class="tc" id="tcFail"></span></button>
      <button class="tab"        data-f="absent"  onclick="setFilter('absent')" >缺席<span class="tc" id="tcAbs"></span></button>
      <button class="tab"        data-f="pending" onclick="setFilter('pending')">待打卡<span class="tc" id="tcPend"></span></button>
    </div>
    <div class="people-card" id="peopleCard"><div class="empty-row">載入中…</div></div>
  </div>

  <div id="detailMsg"></div>
</div>
</div>

<script>
const GAS  = 'https://script.google.com/macros/s/AKfycbzL-370P3fLSl3cv1ci9DO8poobaiXwNW33l4ZOw4HAd7tkGFsZgT_tMkkgA5sBY8vX/exec';
const DOW  = ['日','一','二','三','四','五','六'];

let currentDate   = '';
let allStaff      = [];
let currentFilter = 'alert';


function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmtMD(d) { return d.slice(5).replace('-','/'); }
function getDow(d) { return DOW[new Date(d+'T00:00:00').getDay()]; }

// ── Views ──────────────────────────────────────────────
function showSummary() {
  document.getElementById('viewDetail').classList.remove('active');
  document.getElementById('viewSummary').classList.add('active');
  window.scrollTo(0,0);
}
function showDetailView() {
  document.getElementById('viewSummary').classList.remove('active');
  document.getElementById('viewDetail').classList.add('active');
  window.scrollTo(0,0);
}

// ── Summary ────────────────────────────────────────────
async function loadSummary() {
  document.getElementById('summaryContent').innerHTML =
    '<div class="loader"><span class="spin">⟳</span> 載入中…</div>';
  try {
    const r = await fetch(GAS + '?action=getWeekSummary&t=' + Date.now());
    const j = await r.json();
    renderSummary(j.result);
  } catch(e) {
    document.getElementById('summaryContent').innerHTML =
      '<div class="loader">⚠️ 載入失敗，請確認 GAS 已重新部署。</div>';
  }
}

function renderSummary(days) {
  if (!days || !days.length) {
    document.getElementById('summaryContent').innerHTML =
      '<div class="loader">班表尚無資料。</div>';
    return;
  }
  const today = todayStr();
  let html = '<div class="tile-grid">';
  days.forEach(d => {
    const isToday  = d.date === today;

    // ── 未來灰階 tile ──
    if (d.future) {
      html += `<div class="tile-future">
        <div class="tile-date-row">
          <div class="tf-date">${fmtMD(d.date)}</div>
          <div class="tf-dow">${getDow(d.date)}</div>
        </div>
        <div>
          <div class="tile-num-wrap"><div class="tf-num">—</div></div>
          <div class="tf-label">已到班</div>
        </div>
        <div><span class="tf-lock">尚未開始</span></div>
      </div>`;
      return;
    }

    // ── 過去 / 今天 active tile ──
    const hasIssue = d.absent > 0 || d.punch_failed > 0;
    const allOk    = d.present === d.scheduled && !d.pending && !hasIssue;
    const cls      = isToday ? 'today' : hasIssue ? 'has-issue' : '';
    const numGreen = allOk ? ' green' : '';

    let chips = '';
    if (allOk) {
      chips = '<span class="chip chip-ok">全員到班</span>';
    } else {
      if (d.absent       > 0) chips += '<span class="chip chip-red">缺席 '     + d.absent       + '</span>';
      if (d.punch_failed > 0) chips += '<span class="chip chip-amb">失敗 '     + d.punch_failed + '</span>';
      if (d.pending      > 0) chips += '<span class="chip chip-blue">待打卡 '  + d.pending      + '</span>';
    }

    const tileId = isToday ? ' id="tile-today"' : '';
    html += `<div${tileId} class="tile ${cls}" onclick="loadDetail('${d.date}')">
      <div class="tile-date-row">
        <div class="tile-date">${fmtMD(d.date)}</div>
        <div class="tile-dow">${getDow(d.date)}</div>
        ${isToday ? '<span class="today-tag">今天</span>' : ''}
      </div>
      <div>
        <div class="tile-num-wrap">
          <div class="tile-num${numGreen}">${d.present}</div>
          <div class="tile-denom">/ ${d.scheduled}</div>
        </div>
        <div class="tile-label">已到班</div>
      </div>
      <div class="tile-chips">${chips}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('summaryContent').innerHTML = html;
}

// ── Refresh today tile only ────────────────────────────
async function refreshToday() {
  const tile = document.getElementById('tile-today');
  if (!tile) { loadSummary(); return; }  // 今天沒有班表，退回完整重整

  // 在 tile 上顯示小 spinner
  const chipsEl = tile.querySelector('.tile-chips');
  const origChips = chipsEl ? chipsEl.innerHTML : '';
  if (chipsEl) chipsEl.innerHTML = '<span class="spin" style="font-size:14px">⟳</span>';

  try {
    const r = await fetch(GAS + '?action=getDashboard&date=' + todayStr() + '&t=' + Date.now());
    const j = await r.json();
    const s = j.result && j.result.summary;
    if (!s) throw new Error('no summary');

    const d = { date: todayStr(), present: s.present, scheduled: s.scheduled,
                absent: s.absent, punch_failed: s.punch_failed, pending: s.pending };
    const hasIssue = d.absent > 0 || d.punch_failed > 0;
    const allOk    = d.present === d.scheduled && !d.pending && !hasIssue;
    const numGreen = allOk ? ' green' : '';

    let chips = '';
    if (allOk) {
      chips = '<span class="chip chip-ok">全員到班</span>';
    } else {
      if (d.absent       > 0) chips += '<span class="chip chip-red">缺席 '    + d.absent       + '</span>';
      if (d.punch_failed > 0) chips += '<span class="chip chip-amb">失敗 '    + d.punch_failed + '</span>';
      if (d.pending      > 0) chips += '<span class="chip chip-blue">待打卡 ' + d.pending      + '</span>';
    }

    tile.querySelector('.tile-num').className = 'tile-num' + numGreen;
    tile.querySelector('.tile-num').textContent = d.present;
    tile.querySelector('.tile-denom').textContent = '/ ' + d.scheduled;
    if (chipsEl) chipsEl.innerHTML = chips;
  } catch(e) {
    if (chipsEl) chipsEl.innerHTML = origChips;
  }
}

// ── Detail ─────────────────────────────────────────────
async function loadDetail(date) {
  currentDate   = date;
  currentFilter = 'alert';
  allStaff      = [];
  showDetailView();

  const today = todayStr();
  document.getElementById('detailDate').textContent = fmtMD(date);
  document.getElementById('detailDow').textContent  = '週' + getDow(date) + (date === today ? '・今天' : '');

  // Reset
  document.getElementById('kpiRow').style.display      = 'none';
  document.getElementById('secPeople').style.display   = 'none';
  document.getElementById('searchArea').style.display  = 'none';
  document.getElementById('searchInput').value         = '';
  document.getElementById('detailMsg').innerHTML       =
    '<div class="loader"><span class="spin">⟳</span> 載入中…</div>';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.f === 'alert'));

  try {
    const r = await fetch(GAS + '?action=getDashboard&date=' + date);
    const j = await r.json();
    document.getElementById('detailMsg').innerHTML = '';
    renderDetail(j.result);
  } catch(e) {
    document.getElementById('detailMsg').innerHTML =
      '<div class="loader">⚠️ 載入失敗，請確認 GAS 已重新部署。</div>';
  }
}

function renderDetail(data) {
  const s = data.summary;
  allStaff = data.staff;

  // KPI
  document.getElementById('k0').textContent = s.scheduled;
  document.getElementById('k1').textContent = s.present;
  document.getElementById('k2').textContent = s.punch_failed;
  document.getElementById('k3').textContent = s.absent;
  document.getElementById('k1s').textContent = s.scheduled > 0 ? Math.round(s.present/s.scheduled*100) + '%' : '—';
  document.getElementById('k0s').textContent = s.pending > 0 ? '⏳ ' + s.pending + ' 待打卡' : '';
  document.getElementById('kpiRow').style.display = '';

  // People
  if (allStaff.length) {
    document.getElementById('secPeople').style.display  = '';
    document.getElementById('searchArea').style.display = '';
    document.getElementById('tcA').textContent    = allStaff.filter(x=>x.status==='absent'||x.status==='failed'||x.out_status==='failed').length;
    document.getElementById('tcFail').textContent = allStaff.filter(x=>x.status==='failed').length;
    document.getElementById('tcAbs').textContent  = allStaff.filter(x=>x.status==='absent').length;
    document.getElementById('tcPend').textContent = allStaff.filter(x=>x.status==='pending').length;
    applyFilter();
  }
}

// ── Person row ─────────────────────────────────────────
function buildPersonRow(s) {
  const dotCls = {present:'ok', failed:'fail', absent:'abs', pending:'pend'}[s.status] || 'abs';

  // 上班徽章（🕘）
  const inBadgeCls = {present:'ok', failed:'fail', absent:'abs', pending:'pend'}[s.status] || 'abs';
  const inLabel    = {present:'☀️ 到班', failed:'☀️ 失敗', absent:'☀️ 缺席', pending:'☀️ 待打卡'}[s.status] || '🕘 —';

  // 下班徽章（🌅）
  const outBadgeCls = {ok:'out-ok', failed:'out-fail', absent:'out-abs', pending:'out-pend'}[s.out_status] || 'out-abs';
  const outLabel    = {ok:'🌙 下班', failed:'🌙 下班失敗', absent:'🌙 未下班', pending:'🌙 待打卡'}[s.out_status] || '🌙 —';

  const venueLabel = s.mobility ? '⚡ 機動' : (s.venue ? '📍 ' + s.venue : '');
  const metaParts = [s.group, venueLabel].filter(Boolean);
  const meta      = metaParts.join('・');
  const warnParts = [];
  if (s.fail_reason)     warnParts.push('⚠ ' + s.fail_reason);
  if (s.out_fail_reason) warnParts.push('⚠ 下班・' + s.out_fail_reason);
  const warnHtml  = warnParts.map(w => `<div class="pmeta-warn">${w}</div>`).join('');

  const inTimeHtml  = s.in_time  ? '<div class="ppunch">' + s.in_time  + '</div>' : '';
  const outTimeHtml = s.out_time ? '<div class="ppunch">' + s.out_time + '</div>' : '';

  const phoneHtml = s.phone
    ? `<a class="pphone" href="tel:${s.phone.replace(/\D/g,'')}"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.86 19.86 0 0 1 3.09 5.18 2 2 0 0 1 5.09 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 10.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg>${s.phone}</a>`
    : '';

  return `<div class="prow">
    <div class="pdot ${dotCls}"></div>
    <div class="pinfo">
      <div class="pname-row"><span class="pid">#${s.staff_id}</span><span class="pname">${s.name}</span>${phoneHtml}</div>
      <div class="pmeta">${meta}</div>
      ${warnHtml}
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="pbadge ${inBadgeCls}">${inLabel}</div>
      ${inTimeHtml}
      <div class="pbadge ${outBadgeCls}" style="margin-top:3px">${outLabel}</div>
      ${outTimeHtml}
    </div>
  </div>`;
}

// ── Filter ─────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.f === f));
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = allStaff;
  if (currentFilter === 'alert')         list = list.filter(s => s.status==='absent'||s.status==='failed'||s.out_status==='failed');
  else if (currentFilter !== 'all')      list = list.filter(s => s.status === currentFilter);
  if (q) list = list.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.group.toLowerCase().includes(q) ||
    s.venue.toLowerCase().includes(q)
  );
  const el = document.getElementById('peopleCard');
  el.innerHTML = list.length
    ? list.map(buildPersonRow).join('')
    : '<div class="empty-row">— 無符合資料</div>';
}

// ── Init ───────────────────────────────────────────────
loadSummary();
</script>
