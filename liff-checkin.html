<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>上班打卡</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --card: #1c2030;
      --border: #2a2f42;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.12);
      --accent-glow: rgba(74, 222, 128, 0.35);
      --warn: #f59e0b;
      --err: #f87171;
      --text: #e8eaf2;
      --muted: #6b7280;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 40px;
      gap: 18px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── header ── */
    .header { width: 100%; text-align: center; }
    .header .brand {
      font-size: 11px; font-family: 'DM Mono', monospace;
      letter-spacing: 0.2em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }

    /* ── generic card ── */
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 12px; font-family: 'DM Mono', monospace;
      letter-spacing: 0.15em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 14px;
    }

    /* ── clock ── */
    .clock-time {
      font-family: 'DM Mono', monospace; font-size: 42px; font-weight: 500;
      letter-spacing: 2px; color: var(--accent); line-height: 1; text-align: center;
    }
    .clock-date {
      font-size: 13px; color: var(--muted); margin-top: 6px;
      font-family: 'DM Mono', monospace; text-align: center;
    }

    /* ── user card ── */
    .user-card { display: flex; align-items: center; gap: 14px; }
    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-dim); border: 2px solid var(--accent);
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-avatar .placeholder { font-size: 20px; }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 15px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-id {
      font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace;
      margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .login-status {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      font-family: 'DM Mono', monospace; font-weight: 500;
    }
    .login-status.ok   { background: var(--accent-dim); color: var(--accent); }
    .login-status.err  { background: rgba(248,113,113,.12); color: var(--err); }
    .login-status.warn { background: rgba(245,158,11,.12); color: var(--warn); }

    /* ── name picker ── */
    .picker-input {
      width: 100%; padding: 14px; font-size: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'Noto Sans TC', sans-serif; outline: none;
      transition: border-color .15s;
    }
    .picker-input:focus { border-color: var(--accent); }
    .picker-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .picker-err  { font-size: 13px; color: var(--err); margin-top: 8px; }
    .change-link {
      font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace;
      cursor: pointer; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: 8px; background: transparent;
    }
    .change-link:hover { color: var(--accent); border-color: var(--accent); }

    /* ── PIN ── */
    .pin-input {
      width: 100%; padding: 14px; font-size: 22px; text-align: center;
      letter-spacing: 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px; color: var(--text);
      font-family: 'DM Mono', monospace; outline: none;
    }
    .pin-input:focus { border-color: var(--accent); }
    .pin-hint { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }

    /* ── GPS ── */
    .gps-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .gps-row:last-child { border-bottom: none; }
    .gps-label { font-size: 13px; color: var(--muted); }
    .gps-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
    .gps-value.loading { color: var(--warn); animation: blink 1s infinite; }
    .gps-value.error   { color: var(--err); }
    .gps-value.ok      { color: var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .accuracy-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-family: 'DM Mono', monospace;
      padding: 4px 10px; border-radius: 20px; margin-top: 12px;
    }
    .accuracy-badge.good { background: var(--accent-dim); color: var(--accent); }
    .accuracy-badge.bad  { background: rgba(245,158,11,.12); color: var(--warn); }
    .accuracy-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── buttons ── */
    .btn {
      width: 100%; padding: 18px; border: none; border-radius: var(--radius);
      font-size: 17px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s; letter-spacing: .5px;
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn.type-in  { background: var(--accent); color: #0d0f14; box-shadow: 0 0 24px var(--accent-glow); }
    .btn.type-out { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
    .btn.type-confirm { background: var(--accent); color: #0d0f14; box-shadow: 0 0 16px var(--accent-glow); }
    .btn:disabled { background: var(--border); color: var(--muted); box-shadow: none; cursor: not-allowed; border-color: var(--border); }

    .btn .ripple {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,.25);
      transform: scale(0); animation: ripple .55s linear; pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    /* ── status message ── */
    .status-msg {
      width: 100%; padding: 14px 16px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.5; display: none; white-space: pre-line;
    }
    .status-msg.show    { display: block; }
    .status-msg.success { background: var(--accent-dim); border: 1px solid rgba(74,222,128,.3); color: var(--accent); }
    .status-msg.fail    { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--err); }
    .status-msg.info    { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25); color: var(--warn); }

    /* ── spinner ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.2); border-top-color: currentColor;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── footer ── */
    footer {
      font-size: 11px; color: var(--muted);
      font-family: 'DM Mono', monospace; text-align: center; opacity: .5;
    }

    /* ── utils ── */
    .fade-in { animation: fadeIn .4s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header fade-in">
    <div class="brand">Attendance System</div>
    <h1>員工<span>打卡</span>系統</h1>
  </div>

  <!-- Clock -->
  <div class="card fade-in" style="animation-delay:.05s">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate">----/--/--</div>
  </div>

  <!-- User Info -->
  <div class="card user-card fade-in" style="animation-delay:.1s">
    <div class="user-avatar" id="userAvatar"><span class="placeholder">👤</span></div>
    <div class="user-info">
      <div class="user-name" id="userName">讀取中...</div>
      <div class="user-id"  id="userId">UID: —</div>
    </div>
    <div class="login-status warn" id="loginStatus">...</div>
  </div>

  <!-- 步驟一：姓名輸入（第一次使用 or 換人） -->
  <div class="card hidden" id="pickCard">
    <div class="card-title">👤 身份驗證</div>
    <input type="text" class="picker-input" id="staffInput" autocomplete="off"
           autocapitalize="off" autocorrect="off" placeholder="輸入完整姓名（例：王小明）">
    <div class="picker-hint" id="pickHint">需與管理員建檔的「完整姓名」一致</div>
    <div class="picker-err hidden" id="nameErr"></div>
    <button class="btn type-confirm" id="confirmStaffBtn" style="margin-top:14px">確認</button>
  </div>

  <!-- 換人 link（身份確認後） -->
  <div id="changeStaffRow" class="hidden" style="text-align:right; width:100%; margin-top:-8px;">
    <button class="change-link" id="changeStaffBtn">換人</button>
  </div>

  <!-- GPS 卡 -->
  <div class="card hidden" id="gpsCard">
    <div class="card-title">📡 GPS 定位資訊</div>
    <div class="gps-row"><span class="gps-label">緯度 Lat</span><span class="gps-value loading" id="gpsLat">取得中...</span></div>
    <div class="gps-row"><span class="gps-label">經度 Lng</span><span class="gps-value loading" id="gpsLng">取得中...</span></div>
    <div class="gps-row"><span class="gps-label">精準度</span><span class="gps-value loading" id="gpsAcc">取得中...</span></div>
    <div id="accuracyBadge"></div>
  </div>

  <!-- PIN -->
  <div class="card hidden" id="pinCard">
    <div class="card-title">🔐 手機末四碼</div>
    <input class="pin-input" id="pinInput" type="tel" inputmode="numeric"
           pattern="\d{4}" maxlength="4" autocomplete="off" placeholder="••••">
    <div class="pin-hint">每次打卡都需要，防止代打卡</div>
  </div>

  <!-- 狀態訊息 -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- 上下班按鈕 -->
  <button class="btn type-in hidden" id="btnIn" disabled>
    <span class="spinner hidden" id="spinIn"></span>🟢 上班打卡
  </button>
  <button class="btn type-out hidden" id="btnOut" disabled>
    <span class="spinner hidden" id="spinOut"></span>🔴 下班打卡
  </button>

  <footer class="fade-in" style="animation-delay:.3s">
    GPS 由裝置感測器直接取得 · 無法手動修改
  </footer>

</div>

<script>
/* ═══════════════════════════════════════════════
   ⚙️  設定區
   ═══════════════════════════════════════════════ */
const CONFIG = {
  liffId:      "2010297513-8W4WWzSx",   // 你的 LIFF ID
  gasUrl:      "https://script.google.com/macros/s/AKfycbwHi1KmFtKgAA6aSbUki8qob7EcqUvmS2b9AsPDDwA8Rb9Hz_N-H8C7sqHuXIMABKtpkA/exec",                        // ← 填入 Apps Script 部署 URL
                                          //   例：'https://script.google.com/macros/s/AKfy.../exec'
  maxAccuracy: 100,
};
/* ═══════════════════════════════════════════════ */

const LS_KEY = 'chekcin_staff';
const $ = id => document.getElementById(id);

let staff    = null;   // { id, name }
let lineUser = null;   // LINE profile
let gpsData  = null;   // { lat, lng, accuracy }

// ── Apps Script API helper ──────────────────────
async function callGAS(action, params = {}) {
  if (!CONFIG.gasUrl) throw new Error('請在 CONFIG.gasUrl 填入 Apps Script 部署 URL');
  const res = await fetch(CONFIG.gasUrl, {
    method: 'POST',
    body: JSON.stringify({ action, ...params }),
    // 不設 Content-Type → text/plain，避免 CORS preflight
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── Clock ───────────────────────────────────────
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  $('clockTime').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const days = ['日','一','二','三','四','五','六'];
  $('clockDate').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}（週${days[now.getDay()]}）`;
}
updateClock();
setInterval(updateClock, 1000);

// ── LIFF Init ───────────────────────────────────
async function initLiff() {
  if (!CONFIG.liffId) { setLoginStatus('未設定 LIFF ID', 'err'); return false; }
  try {
    setLoginStatus('LINE 登入中…', 'warn');
    await liff.init({ liffId: CONFIG.liffId });
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.origin + location.pathname });
      return false;
    }
    const p = await liff.getProfile();
    lineUser = p;
    $('userAvatar').innerHTML = p.pictureUrl
      ? `<img src="${escapeAttr(p.pictureUrl)}" alt="avatar">`
      : '<span class="placeholder">👤</span>';
    setLoginStatus('LINE 已登入', 'ok');
    return true;
  } catch (e) {
    setLoginStatus('LIFF 錯誤', 'err');
    showStatus('LIFF 初始化失敗：' + (e.message || e), 'fail');
    return false;
  }
}

function setLoginStatus(text, cls) {
  const el = $('loginStatus');
  el.textContent = text;
  el.className = 'login-status ' + cls;
}

// ── 身份解析 ────────────────────────────────────
function resolveStaff() {
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
  if (saved && saved.id) {
    staff = saved;
    showLoggedInUI();
    return;
  }
  // LINE displayName 預填，但仍需按確認去 Sheet 驗證
  if (lineUser && lineUser.displayName) {
    showPickerUI(lineUser.displayName, '從 LINE 帶入姓名，請按確認驗證');
  } else {
    showPickerUI('', '');
  }
}

function showPickerUI(prefill, hint) {
  $('pickCard').classList.remove('hidden');
  $('staffInput').value = prefill || '';
  if (hint) $('pickHint').textContent = hint;
  $('nameErr').classList.add('hidden');
  setTimeout(() => $('staffInput').focus(), 80);
}

function showLoggedInUI() {
  $('pickCard').classList.add('hidden');
  $('changeStaffRow').classList.remove('hidden');
  $('gpsCard').classList.remove('hidden');
  $('pinCard').classList.remove('hidden');
  $('btnIn').classList.remove('hidden');
  $('btnOut').classList.remove('hidden');

  $('userName').textContent = staff.name;
  $('userId').textContent = lineUser
    ? 'UID: ' + lineUser.userId.slice(0,16) + '…'
    : '工讀生 #' + staff.id;

  prefetchPosition();
}

function confirmStaff() {
  const name = $('staffInput').value.trim();
  if (!name) { showNameErr('請輸入姓名'); return; }
  const btn = $('confirmStaffBtn');
  btn.disabled = true;
  callGAS('lookupStaffByName', { name })
    .then(result => {
      btn.disabled = false;
      if (!result || !result.id) {
        showNameErr('查無此人，請確認姓名拼寫或聯絡管理員');
        return;
      }
      staff = { id: result.id, name: result.name };
      localStorage.setItem(LS_KEY, JSON.stringify(staff));
      showLoggedInUI();
    })
    .catch(e => {
      btn.disabled = false;
      showNameErr('系統錯誤：' + (e.message || e));
    });
}

function showNameErr(msg) {
  const el = $('nameErr');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── GPS ─────────────────────────────────────────
function getPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('此裝置不支援定位'));
    navigator.geolocation.getCurrentPosition(
      resolve,
      e => {
        const msgs = {
          1: '請允許瀏覽器使用位置權限',
          2: '無法取得位置（GPS 訊號弱？）',
          3: '定位逾時，請重試',
        };
        reject(new Error(msgs[e.code] || '定位失敗'));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

async function prefetchPosition() {
  setGpsVal('gpsLat', '取得中…', 'loading');
  setGpsVal('gpsLng', '取得中…', 'loading');
  setGpsVal('gpsAcc', '取得中…', 'loading');
  $('accuracyBadge').innerHTML = '';
  try {
    const pos = await getPosition();
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    gpsData = { lat, lng, accuracy };
    setGpsVal('gpsLat', lat.toFixed(6), 'ok');
    setGpsVal('gpsLng', lng.toFixed(6), 'ok');
    setGpsVal('gpsAcc', `${Math.round(accuracy)} 公尺`, accuracy <= CONFIG.maxAccuracy ? 'ok' : 'loading');
    const good = accuracy <= CONFIG.maxAccuracy;
    $('accuracyBadge').innerHTML = good
      ? '<div class="accuracy-badge good"><span class="dot"></span>定位精準，可以打卡</div>'
      : '<div class="accuracy-badge bad"><span class="dot"></span>精準度不足，建議移至空曠處</div>';
    $('btnIn').disabled  = false;
    $('btnOut').disabled = false;
  } catch (e) {
    setGpsVal('gpsLat', '錯誤', 'error');
    setGpsVal('gpsLng', '錯誤', 'error');
    setGpsVal('gpsAcc', e.message, 'error');
    showStatus(e.message, 'fail');
  }
}

function setGpsVal(id, val, cls) {
  const el = $(id);
  el.textContent = val;
  el.className = 'gps-value ' + cls;
}

// ── 打卡 ────────────────────────────────────────
async function punch(type) {
  const pin = $('pinInput').value.trim();
  if (!/^\d{4}$/.test(pin)) {
    $('pinInput').focus();
    showStatus('請先輸入手機末四碼（4 位數字）', 'fail');
    return;
  }
  if (!gpsData) {
    showStatus('GPS 尚未就緒，請稍候', 'info');
    prefetchPosition();
    return;
  }

  const btnId  = type === 'in' ? 'btnIn'  : 'btnOut';
  const spinId = type === 'in' ? 'spinIn' : 'spinOut';
  $('btnIn').disabled  = true;
  $('btnOut').disabled = true;
  $(spinId).classList.remove('hidden');

  showStatus('📡 取得最新定位中…', 'info');
  let lat, lng, accuracy;
  try {
    const pos = await getPosition();
    lat = pos.coords.latitude; lng = pos.coords.longitude; accuracy = pos.coords.accuracy;
    gpsData = { lat, lng, accuracy };
    setGpsVal('gpsLat', lat.toFixed(6), 'ok');
    setGpsVal('gpsLng', lng.toFixed(6), 'ok');
    setGpsVal('gpsAcc', `${Math.round(accuracy)} 公尺`, accuracy <= CONFIG.maxAccuracy ? 'ok' : 'loading');
  } catch (e) {
    $(spinId).classList.add('hidden');
    $('btnIn').disabled = false; $('btnOut').disabled = false;
    showStatus(e.message, 'fail');
    return;
  }

  showStatus('🛰️ 比對站點中…', 'info');

  callGAS('submitPunch', {
    staffName:  staff.name,
    pin:        pin,
    type:       type,
    lat:        lat,
    lng:        lng,
    accuracy:   accuracy,
    lineUserId: lineUser ? lineUser.userId : '',
    lineName:   lineUser ? lineUser.displayName : '',
  })
  .then(data => {
    $(spinId).classList.add('hidden');
    $('btnIn').disabled = false; $('btnOut').disabled = false;
    handlePunchResult(data);
  })
  .catch(e => {
    $(spinId).classList.add('hidden');
    $('btnIn').disabled = false; $('btnOut').disabled = false;
    showStatus('系統錯誤：' + (e.message || String(e)), 'fail');
  });
}

function handlePunchResult(data) {
  if (data.ok) {
    const td = data.time_diff_min;
    let timeNote = '';
    if (td !== '' && td != null) {
      if (td === 0)    timeNote = '準時';
      else if (td > 0) timeNote = `比預定時間晚 ${td} 分鐘`;
      else             timeNote = `比預定時間早 ${-td} 分鐘`;
    }
    const msg =
      `✅ ${data.type === 'in' ? '上班' : '下班'}打卡成功\n` +
      `預定場地：${data.scheduled_venue || '—'}\n` +
      `預定時間：${data.scheduled_time || '—'}` +
      (timeNote ? `（${timeNote}）` : '') +
      `\n距離：${data.distance_m}m`;
    showStatus(msg, 'success');
    $('pinInput').value = '';
    if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
      liff.sendMessages([{ type:'text', text: msg.replace(/✅/g, '') }]).catch(()=>{});
    }
  } else {
    let msg;
    switch (data.reason) {
      case 'pin_required':       msg = '請輸入手機末四碼'; break;
      case 'pin_mismatch':       msg = '手機末四碼錯誤，請確認後重試'; $('pinInput').value=''; $('pinInput').focus(); break;
      case 'pin_not_configured': msg = '管理員尚未為你設定手機號碼，請聯絡管理員'; break;
      case 'no_schedule':        msg = data.message || '您今日未排班，無法打卡'; break;
      case 'in_too_early':
      case 'in_too_late':
      case 'out_before_start':
      case 'out_too_late':       msg = data.message || '不在允許的打卡時段'; break;
      case 'wrong_location':     msg = `不在預定場地範圍：「${data.scheduled_venue}」\n距離 ${data.distance_m}m`; break;
      case 'unknown_venue':      msg = `班表場地「${data.venue || ''}」不在場地對照表中，請聯絡管理員`; break;
      case 'low_accuracy':       msg = `GPS 精度過低 (±${data.accuracy_m}m)，請到空曠處重試`; break;
      case 'staff_not_found':
        msg = '找不到你的人員資料，請重新輸入姓名';
        localStorage.removeItem(LS_KEY); staff = null;
        setTimeout(() => location.reload(), 2000);
        break;
      default: msg = data.reason || '未知錯誤';
    }
    showStatus('❌ 打卡失敗\n' + msg, 'fail');
  }
}

// ── UI helpers ──────────────────────────────────
function showStatus(msg, type) {
  const el = $('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg show ' + type;
}
function escapeAttr(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Event bindings ───────────────────────────────
$('confirmStaffBtn').addEventListener('click', confirmStaff);
$('staffInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmStaff(); });

$('changeStaffBtn').addEventListener('click', () => {
  if (!confirm('要重新輸入姓名嗎？')) return;
  localStorage.removeItem(LS_KEY); staff = null; location.reload();
});

$('btnIn').addEventListener('click',  () => punch('in'));
$('btnOut').addEventListener('click', () => punch('out'));

// Ripple effect
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => {
    if (btn.disabled) return;
    const r = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(r.width, r.height);
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});

// ── Boot ────────────────────────────────────────
(async function boot() {
  await initLiff();
  resolveStaff();
})();
</script>
