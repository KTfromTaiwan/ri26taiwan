<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>上班打卡</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --card: #1c2030;
      --border: #2a2f42;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.12);
      --accent-glow: rgba(74, 222, 128, 0.35);
      --warn: #f59e0b;
      --err: #f87171;
      --text: #e8eaf2;
      --muted: #6b7280;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 20px 40px;
      gap: 20px;
    }

    /* ── header ── */
    .header {
      width: 100%;
      text-align: center;
    }
    .header .brand {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .header h1 span { color: var(--accent); }

    /* ── clock ── */
    .clock-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .clock-time {
      font-family: 'DM Mono', monospace;
      font-size: 42px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1;
    }
    .clock-date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
    }

    /* ── user info ── */
    .user-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-avatar .placeholder { font-size: 20px; }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-id {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .login-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }
    .login-status.ok  { background: var(--accent-dim); color: var(--accent); }
    .login-status.err { background: rgba(248,113,113,.12); color: var(--err); }

    /* ── GPS card ── */
    .gps-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .gps-card-title {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .gps-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .gps-row:last-child { border-bottom: none; }
    .gps-label { font-size: 13px; color: var(--muted); }
    .gps-value {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }
    .gps-value.loading { color: var(--warn); animation: blink 1s infinite; }
    .gps-value.error   { color: var(--err); }
    .gps-value.ok      { color: var(--accent); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── accuracy badge ── */
    .accuracy-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 12px;
    }
    .accuracy-badge.good { background: var(--accent-dim); color: var(--accent); }
    .accuracy-badge.bad  { background: rgba(245,158,11,.12); color: var(--warn); }
    .accuracy-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── main button ── */
    .btn-checkin {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      letter-spacing: .5px;
    }
    .btn-checkin:active { transform: scale(.97); }

    .btn-checkin.type-in {
      background: var(--accent);
      color: #0d0f14;
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .btn-checkin.type-out {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    .btn-checkin:disabled {
      background: var(--border);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ripple */
    .btn-checkin .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: ripple .55s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── status message ── */
    .status-msg {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .status-msg.show { display: block; }
    .status-msg.success {
      background: var(--accent-dim);
      border: 1px solid rgba(74,222,128,.3);
      color: var(--accent);
    }
    .status-msg.fail {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      color: var(--err);
    }
    .status-msg.info {
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.25);
      color: var(--warn);
    }

    /* ── footer ── */
    footer {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      text-align: center;
      opacity: .5;
    }

    /* ── spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── fade-in ── */
    .fade-in {
      animation: fadeIn .4s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header fade-in">
    <div class="brand">Attendance System</div>
    <h1>員工<span>打卡</span>系統</h1>
  </div>

  <!-- Clock -->
  <div class="clock-card fade-in" style="animation-delay:.05s">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate">----/--/--</div>
  </div>

  <!-- User Info -->
  <div class="user-card fade-in" style="animation-delay:.1s">
    <div class="user-avatar" id="userAvatar">
      <span class="placeholder">👤</span>
    </div>
    <div class="user-info">
      <div class="user-name" id="userName">讀取中...</div>
      <div class="user-id"  id="userId">UID: —</div>
    </div>
    <div class="login-status" id="loginStatus">...</div>
  </div>

  <!-- GPS -->
  <div class="gps-card fade-in" style="animation-delay:.15s">
    <div class="gps-card-title">📡 GPS 定位資訊</div>
    <div class="gps-row">
      <span class="gps-label">緯度 Lat</span>
      <span class="gps-value loading" id="gpsLat">取得中...</span>
    </div>
    <div class="gps-row">
      <span class="gps-label">經度 Lng</span>
      <span class="gps-value loading" id="gpsLng">取得中...</span>
    </div>
    <div class="gps-row">
      <span class="gps-label">精準度</span>
      <span class="gps-value loading" id="gpsAcc">取得中...</span>
    </div>
    <div id="accuracyBadge"></div>
  </div>

  <!-- Status Message -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Buttons -->
  <button class="btn-checkin type-in fade-in" id="btnIn"
          style="animation-delay:.2s" disabled onclick="doCheckin('上班')">
    <span class="spinner" id="spinIn" style="display:none"></span>
    🟢 上班打卡
  </button>

  <button class="btn-checkin type-out fade-in" id="btnOut"
          style="animation-delay:.25s" disabled onclick="doCheckin('下班')">
    <span class="spinner" id="spinOut" style="display:none"></span>
    🔴 下班打卡
  </button>

  <footer class="fade-in" style="animation-delay:.3s">
    GPS 由裝置感測器直接取得 · 無法手動修改
  </footer>

</div>

<script>
/* ═══════════════════════════════════════════════════
   ⚙️  設定區 — 請依實際情況修改
   ═══════════════════════════════════════════════════ */
const CONFIG = {
  liffId:      "2010297513-8W4WWzSx",          // 你的 LIFF ID（從 LINE Developers 取得）
  webhookUrl:  "https://hook.eu1.make.com/2qt6klkcs2mytbgq5hbsdqegiicvyofi", // Make.com webhook URL-Kenny test
  maxAccuracy: 100,                      // GPS 精準度門檻（公尺），超過則警告
};
/* ═══════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────
let gpsData   = null;   // { lat, lng, accuracy, timestamp }
let lineUser  = null;   // LINE profile

// ── Clock ──────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clockTime').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}（週${days[now.getDay()]}）`;
}
updateClock();
setInterval(updateClock, 1000);

// ── LIFF Init ──────────────────────────────────────
async function initLiff() {
  try {
    await liff.init({ liffId: CONFIG.liffId });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUser = profile;

    document.getElementById('userName').textContent = profile.displayName;
    document.getElementById('userId').textContent   = `UID: ${profile.userId.slice(0,16)}...`;

    const loginEl = document.getElementById('loginStatus');
    loginEl.textContent = '已登入';
    loginEl.className   = 'login-status ok';

    const avatarEl = document.getElementById('userAvatar');
    if (profile.pictureUrl) {
      avatarEl.innerHTML = `<img src="${profile.pictureUrl}" alt="avatar">`;
    }

  } catch (e) {
    console.error('LIFF init error:', e);
    const loginEl = document.getElementById('loginStatus');
    loginEl.textContent = '未登入';
    loginEl.className   = 'login-status err';
    showStatus('LIFF 初始化失敗，請重新開啟頁面', 'fail');
  }
}

// ── GPS ────────────────────────────────────────────
function getGPS() {
  if (!navigator.geolocation) {
    showStatus('此裝置不支援 GPS 定位', 'fail');
    setGpsError('不支援');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      gpsData = { lat, lng, accuracy, timestamp: new Date().toISOString() };

      const fmt = n => n.toFixed(6);
      setGpsVal('gpsLat', fmt(lat),      'ok');
      setGpsVal('gpsLng', fmt(lng),      'ok');
      setGpsVal('gpsAcc', `${Math.round(accuracy)} 公尺`, accuracy <= CONFIG.maxAccuracy ? 'ok' : 'loading');

      // accuracy badge
      const badge = document.getElementById('accuracyBadge');
      if (accuracy <= CONFIG.maxAccuracy) {
        badge.innerHTML = `<div class="accuracy-badge good"><span class="dot"></span>定位精準，可以打卡</div>`;
        enableButtons();
      } else {
        badge.innerHTML = `<div class="accuracy-badge bad"><span class="dot"></span>精準度不足，建議移至空曠處重試</div>`;
        enableButtons(); // 仍允許打卡，但顯示警告
      }
    },
    (err) => {
      const msgs = {
        1: '請允許瀏覽器存取定位權限，再重新整理頁面',
        2: 'GPS 訊號無法取得，請移至空曠處',
        3: 'GPS 取得逾時，請重新整理頁面',
      };
      showStatus(msgs[err.code] || '無法取得 GPS', 'fail');
      setGpsError(msgs[err.code] || '錯誤');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    //                                                    ^ maximumAge:0 強制取得最新定位
  );
}

function setGpsVal(id, val, cls) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = `gps-value ${cls}`;
}
function setGpsError(msg) {
  ['gpsLat','gpsLng','gpsAcc'].forEach(id => setGpsVal(id, msg, 'error'));
}
function enableButtons() {
  if (!lineUser) return; // 等 LINE 登入完成
  document.getElementById('btnIn').disabled  = false;
  document.getElementById('btnOut').disabled = false;
}

// ── Checkin ────────────────────────────────────────
async function doCheckin(type) {
  if (!gpsData)   { showStatus('尚未取得 GPS，請稍候', 'info'); return; }
  if (!lineUser)  { showStatus('尚未取得 LINE 帳號資訊', 'info'); return; }

  const btnId  = type === '上班' ? 'btnIn' : 'btnOut';
  const spinId = type === '上班' ? 'spinIn' : 'spinOut';
  const btn    = document.getElementById(btnId);
  const spin   = document.getElementById(spinId);

  btn.disabled    = true;
  spin.style.display = 'inline-block';
  showStatus('打卡資料傳送中...', 'info');

  const payload = {
    type:        type,           // "上班" / "下班"
    lineUserId:  lineUser.userId,
    displayName: lineUser.displayName,
    lat:         gpsData.lat,
    lng:         gpsData.lng,
    accuracy:    gpsData.accuracy,
    timestamp:   new Date().toISOString(),
    source:      'LIFF_GPS',     // 標記這是真實 GPS，非手動傳位置
  };

  try {
    const res = await fetch(CONFIG.webhookUrl, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    if (res.ok) {
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      showStatus(`✅ ${type}打卡成功！\n時間：${timeStr}\n位置：${gpsData.lat.toFixed(5)}, ${gpsData.lng.toFixed(5)}`, 'success');
      // 打卡後傳 LINE 訊息確認（選用）
      sendLineConfirm(type, timeStr);
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    console.error(e);
    showStatus(`❌ 打卡失敗，請重試（${e.message}）`, 'fail');
    btn.disabled = false;
  } finally {
    spin.style.display = 'none';
  }
}

// ── LINE 回傳確認訊息（選用）──────────────────────
function sendLineConfirm(type, timeStr) {
  if (!liff.isInClient()) return; // 只在 LINE 內才傳
  liff.sendMessages([{
    type: 'text',
    text: `✅ ${type}打卡完成\n時間：${timeStr}\n（GPS 真實定位）`,
  }]).catch(() => {}); // 靜默失敗
}

// ── UI helper ─────────────────────────────────────
function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className   = `status-msg show ${type}`;
}

// Ripple effect
document.querySelectorAll('.btn-checkin').forEach(btn => {
  btn.addEventListener('click', e => {
    const r = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(r.width, r.height);
    ripple.style.cssText = `width:${size}px;height:${size}px;
      left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});

// ── Boot ──────────────────────────────────────────
initLiff();
getGPS();
</script>
</body>
</html>
